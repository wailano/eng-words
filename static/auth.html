<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google 로그인</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
    }
    .card {
      background: white; border-radius: 16px;
      padding: 48px 40px; text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.12); width: 360px;
    }
    .logo { font-size: 2.5rem; margin-bottom: 8px; }
    h1 { font-size: 1.4rem; color: #1a1a2e; margin-bottom: 6px; }
    p { color: #888; font-size: 0.85rem; margin-bottom: 32px; }
    #google-btn {
      width: 100%; padding: 13px 20px;
      background: white; color: #444;
      border: 1.5px solid #ddd; border-radius: 8px;
      cursor: pointer; font-size: 15px;
      display: flex; align-items: center; justify-content: center; gap: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      transition: box-shadow 0.2s, border-color 0.2s;
    }
    #google-btn:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.18); border-color: #bbb; }
    #google-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    #google-btn img { width: 20px; height: 20px; }
    #status {
      margin-top: 16px; font-size: 13px; color: #666;
      min-height: 20px;
    }
    #error { color: #e53e3e; font-size: 12px; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">📚</div>
    <h1>영단어 학습 시스템</h1>
    <p>Google 계정으로 계속하기</p>

    <button id="google-btn" onclick="doLogin()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
      Google 계정으로 로그인
    </button>
    <div id="status"></div>
    <div id="error"></div>
  </div>

  <script type="module">
    import { initializeApp } from
      'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getAuth, signInWithPopup, GoogleAuthProvider }
      from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

    const firebaseConfig = {
      apiKey:            "AIzaSyAUiilXkrq7qv0zqmAmG0wy8pRLtn8CecI",
      authDomain:        "haruon-eee4d.firebaseapp.com",
      projectId:         "haruon-eee4d",
      storageBucket:     "haruon-eee4d.firebasestorage.app",
      messagingSenderId: "164426709718",
      appId:             "1:164426709718:web:0bf3ed8f0ae7a40a41e777"
    };

    const app      = initializeApp(firebaseConfig);
    const auth     = getAuth(app);
    const provider = new GoogleAuthProvider();

    window.doLogin = async function() {
      const btn    = document.getElementById('google-btn');
      const status = document.getElementById('status');
      const errEl  = document.getElementById('error');

      btn.disabled   = true;
      status.textContent = '로그인 중...';
      errEl.textContent  = '';

      try {
        const result = await signInWithPopup(auth, provider);
        const token  = await result.user.getIdToken(true);
        const email  = result.user.email;

        status.textContent = '✅ 인증 완료! 앱으로 이동 중...';

        // 메인 Streamlit 앱으로 토큰과 함께 리다이렉트 (origin 자동 감지)
        window.location.href =
          `${window.location.origin}/?auth_token=${encodeURIComponent(token)}&auth_email=${encodeURIComponent(email)}`;
      } catch (err) {
        btn.disabled       = false;
        status.textContent = '';
        errEl.textContent  = '오류: ' + err.message;
        console.error(err);
      }
    };
  </script>
</body>
</html>
